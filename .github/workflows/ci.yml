name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git wget pkg-config \
            qt6-base-dev qt6-serialport-dev qt6-webengine-dev \
            qt6-connectivity-dev \
            libprotobuf-dev protobuf-compiler \
            libssl-dev libqrencode-dev

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build . -- -j$(nproc)

      - name: Build DEB Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          cpack -G DEB

      - name: Upload Linux Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/meshtastic-vibe-client-*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtserialport qtwebchannel qtwebengine qtpositioning qtconnectivity'

      - name: Install vcpkg dependencies
        run: vcpkg install protobuf:x64-windows openssl:x64-windows

      - name: Build qrencode from source
        shell: pwsh
        run: |
          git clone --depth=1 --branch v4.1.1 https://github.com/fukuchi/libqrencode.git C:\qrencode-src
          cmake -S C:\qrencode-src -B C:\qrencode-build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="C:\qrencode-install" `
            -DBUILD_SHARED_LIBS=OFF `
            -DWITH_TOOLS=OFF `
            -DWITH_TESTS=OFF
          cmake --build C:\qrencode-build --config Release
          cmake --install C:\qrencode-build --config Release

      - name: Configure
        run: |
          mkdir build-win
          cd build-win
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DQt6_DIR="$env:Qt6_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="C:\qrencode-install" ..

      - name: Build
        run: |
          cd build-win
          cmake --build . --config Release

      - name: Stage application files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build-win\dist | Out-Null

          # Executable
          Copy-Item build-win\Release\meshtastic-vibe-client.exe build-win\dist\

          # Resources
          Copy-Item -Recurse resources build-win\dist\resources

          # Deploy Qt DLLs alongside the exe
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw `
            build-win\dist\meshtastic-vibe-client.exe

          # Copy vcpkg runtime DLLs (protobuf, openssl, qrencode)
          Get-ChildItem C:\vcpkg\installed\x64-windows\bin\*.dll |
            Where-Object { $_.Name -match 'protobuf|ssl|crypto|qrencode' } |
            Copy-Item -Destination build-win\dist\

      - name: Install NSIS
        run: choco install nsis -y

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          if ($ver -notmatch '^v?\d') { $ver = "1.0.0" }
          $ver = $ver -replace '^v', ''
          echo "VER=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Windows installer
        run: makensis /DAPP_VERSION=${{ steps.version.outputs.VER }} installer\windows.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: meshtastic-vibe-client-*-windows-setup.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: linux-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-artifacts/meshtastic-vibe-client-*.deb
            windows-artifacts/meshtastic-vibe-client-*-windows-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
