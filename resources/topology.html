<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
svg { width: 100%; height: 100%; }
.node circle { cursor: pointer; stroke-width: 2px; }
.node text { font-size: 11px; fill: #e0e0e0; pointer-events: none; text-anchor: middle; }
.link { stroke-opacity: 0.7; }
.link-label { font-size: 9px; fill: #888; pointer-events: none; }
#tooltip {
    position: absolute; display: none; background: rgba(30,30,60,0.95);
    border: 1px solid #555; border-radius: 6px; padding: 10px; color: #e0e0e0;
    font-size: 12px; pointer-events: none; z-index: 10; max-width: 250px;
}
#legend {
    position: absolute; bottom: 10px; left: 10px; background: rgba(30,30,60,0.85);
    border: 1px solid #444; border-radius: 6px; padding: 10px; color: #ccc; font-size: 11px;
}
#legend div { margin: 3px 0; display: flex; align-items: center; gap: 6px; }
#legend .swatch { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
#legend .line-swatch { width: 30px; height: 3px; display: inline-block; border-radius: 2px; }
#search-box {
    position: absolute; top: 10px; right: 10px;
    background: rgba(30,30,60,0.9); border: 1px solid #555;
    border-radius: 6px; padding: 6px 10px; color: #e0e0e0;
    font-size: 12px; outline: none; width: 200px;
}
#search-box::placeholder { color: #888; }
</style>
</head>
<body>
<svg id="graph"></svg>
<div id="tooltip"></div>
<input id="search-box" type="text" placeholder="Search nodes..." />
<div id="legend">
    <b>Nodes (avg SNR)</b>
    <div><span class="swatch" style="background:#4fc3f7;border:2px solid #fff"></span> My Node</div>
    <div><span class="swatch" style="background:#66bb6a"></span> Good (&ge; 5 dB)</div>
    <div><span class="swatch" style="background:#ffeb3b"></span> Fair (0&ndash;5 dB)</div>
    <div><span class="swatch" style="background:#ffa726"></span> Weak (&minus;5&ndash;0 dB)</div>
    <div><span class="swatch" style="background:#f44336"></span> Poor (&lt; &minus;5 dB)</div>
    <div><span class="swatch" style="background:#888"></span> Unknown</div>
    <b style="margin-top:6px;display:block">Links</b>
    <div><span class="line-swatch" style="background:#4caf50"></span> Good SNR (&ge; 5)</div>
    <div><span class="line-swatch" style="background:#ff9800"></span> Medium SNR (0&ndash;5)</div>
    <div><span class="line-swatch" style="background:#f44336"></span> Weak SNR (&lt; 0)</div>
    <div><span class="line-swatch" style="background:#888;border-top:2px dashed #888;height:0"></span> Unidirectional</div>
</div>

<script>
var svg = document.getElementById('graph');
var tooltip = document.getElementById('tooltip');
var searchBox = document.getElementById('search-box');
var width, height;
var nodes = {};
var links = {};
var svgNS = 'http://www.w3.org/2000/svg';
var transform = { x: 0, y: 0, k: 1 };
var dragTarget = null, dragOffset = { x: 0, y: 0 };

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
}
window.addEventListener('resize', resize);
resize();

// Layer groups
var gMain = document.createElementNS(svgNS, 'g');
gMain.setAttribute('id', 'main');
svg.appendChild(gMain);

var gLinks = document.createElementNS(svgNS, 'g');
gLinks.setAttribute('id', 'links');
gMain.appendChild(gLinks);

var gNodes = document.createElementNS(svgNS, 'g');
gNodes.setAttribute('id', 'nodes');
gMain.appendChild(gNodes);

// ── Zoom & Pan ────────────────────────────────────────────────────────────────
var isPanning = false, panStart = { x: 0, y: 0 };
svg.addEventListener('mousedown', function(e) {
    if (e.target === svg || e.target === gMain) {
        isPanning = true;
        panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    }
});
svg.addEventListener('mousemove', function(e) {
    if (isPanning) {
        transform.x = e.clientX - panStart.x;
        transform.y = e.clientY - panStart.y;
        applyTransform();
    }
});
svg.addEventListener('mouseup', function() { isPanning = false; });
svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    var scale = e.deltaY > 0 ? 0.9 : 1.1;
    var rect = svg.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    transform.x = mx - (mx - transform.x) * scale;
    transform.y = my - (my - transform.y) * scale;
    transform.k *= scale;
    transform.k = Math.max(0.1, Math.min(5, transform.k));
    applyTransform();
});

function applyTransform() {
    gMain.setAttribute('transform',
        'translate(' + transform.x + ',' + transform.y + ') scale(' + transform.k + ')');
}

// ── Force Simulation ──────────────────────────────────────────────────────────
var simNodes = [];
var simLinks = [];
var simRunning = false;
var simAlpha = 1;

function tick() {
    if (!simRunning) return;

    simAlpha *= 0.99;
    if (simAlpha < 0.001) { simRunning = false; return; }

    var cx = width / 2, cy = height / 2;
    var i, j, n, m, dx, dy, dist, force, fx, fy;

    // Center gravity + repulsion
    for (i = 0; i < simNodes.length; i++) {
        n = simNodes[i];
        if (n.fixed) continue;

        n.vx += (cx - n.x) * 0.0005 * simAlpha;
        n.vy += (cy - n.y) * 0.0005 * simAlpha;

        for (j = i + 1; j < simNodes.length; j++) {
            m = simNodes[j];
            dx = n.x - m.x;
            dy = n.y - m.y;
            dist = Math.sqrt(dx * dx + dy * dy) || 1;
            force = 800 * simAlpha / (dist * dist);
            fx = dx / dist * force;
            fy = dy / dist * force;
            if (!n.fixed) { n.vx += fx; n.vy += fy; }
            if (!m.fixed) { m.vx -= fx; m.vy -= fy; }
        }
    }

    // Link spring
    for (i = 0; i < simLinks.length; i++) {
        var l = simLinks[i];
        var s = l.source, t = l.target;
        dx = t.x - s.x;
        dy = t.y - s.y;
        dist = Math.sqrt(dx * dx + dy * dy) || 1;
        force = (dist - 120) * 0.005 * simAlpha;
        fx = dx / dist * force;
        fy = dy / dist * force;
        if (!s.fixed) { s.vx += fx; s.vy += fy; }
        if (!t.fixed) { t.vx -= fx; t.vy -= fy; }
    }

    // Collision — push overlapping nodes apart by their radii
    for (i = 0; i < simNodes.length; i++) {
        n = simNodes[i];
        for (j = i + 1; j < simNodes.length; j++) {
            m = simNodes[j];
            dx = n.x - m.x;
            dy = n.y - m.y;
            dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
            var minDist = n.r + m.r + 4;
            if (dist < minDist) {
                var overlap = (minDist - dist) / 2;
                var nx = dx / dist * overlap;
                var ny = dy / dist * overlap;
                if (!n.fixed) { n.x += nx; n.y += ny; }
                if (!m.fixed) { m.x -= nx; m.y -= ny; }
            }
        }
    }

    // Integrate velocity
    for (i = 0; i < simNodes.length; i++) {
        n = simNodes[i];
        if (n.fixed) continue;
        n.vx *= 0.85;
        n.vy *= 0.85;
        n.x += n.vx;
        n.y += n.vy;
    }

    render();
    requestAnimationFrame(tick);
}

function render() {
    for (var key in links) {
        var l = links[key];
        if (l.el && l.source && l.target) {
            l.el.setAttribute('x1', l.source.x);
            l.el.setAttribute('y1', l.source.y);
            l.el.setAttribute('x2', l.target.x);
            l.el.setAttribute('y2', l.target.y);
            if (l.labelEl) {
                l.labelEl.setAttribute('x', (l.source.x + l.target.x) / 2);
                l.labelEl.setAttribute('y', (l.source.y + l.target.y) / 2 - 5);
            }
        }
    }
    for (var id in nodes) {
        var n = nodes[id];
        if (n.gEl) n.gEl.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');
    }
}

// ── Visual encoding ───────────────────────────────────────────────────────────

// Node colour: based on average SNR across its links
function getNodeColor(node) {
    if (node.isMyNode)        return '#4fc3f7';  // cyan  – my device
    if (node.avgSnr <= -999)  return '#888';     // gray  – no SNR data
    if (node.avgSnr >= 5)     return '#66bb6a';  // green – good
    if (node.avgSnr >= 0)     return '#ffeb3b';  // yellow – fair
    if (node.avgSnr >= -5)    return '#ffa726';  // orange – weak
    return '#f44336';                            // red   – poor
}

// Node radius: grows logarithmically with observation count
function getNodeRadius(node) {
    return Math.round(8 + Math.min(8, Math.log10(node.count + 1) * 4));
}

// Link colour: based on average SNR on that link
function getLinkColor(snr) {
    if (snr > -999) {
        if (snr >= 5)  return '#4caf50';
        if (snr >= 0)  return '#ff9800';
        return '#f44336';
    }
    return '#888';
}

// Link width: grows with how many times the link was seen
function getLinkWidth(count) {
    return Math.max(1.5, Math.min(5, 1.5 + Math.log10(count + 1) * 1.5));
}

// ── Graph API (called from C++) ───────────────────────────────────────────────

// addNode(nodeNum, name, shortName, isMyNode, role, avgSnr, count)
function addNode(nodeNum, name, shortName, isMyNode, role, avgSnr, count) {
    if (nodes[nodeNum]) {
        var n = nodes[nodeNum];
        n.name = name; n.shortName = shortName;
        n.isMyNode = isMyNode; n.role = role;
        n.avgSnr = avgSnr; n.count = count;
        n.r = getNodeRadius(n);
        if (n.circleEl) {
            n.circleEl.setAttribute('fill', getNodeColor(n));
            n.circleEl.setAttribute('r', n.r);
            n.circleEl.setAttribute('stroke', isMyNode ? '#fff' : getNodeColor(n));
        }
        if (n.textEl) {
            n.textEl.setAttribute('dy', n.r + 14);
            n.textEl.textContent = shortName;
        }
        return;
    }

    var n = {
        id: nodeNum, name: name, shortName: shortName,
        isMyNode: isMyNode, role: role, avgSnr: avgSnr, count: count,
        x: width / 2 + (Math.random() - 0.5) * 200,
        y: height / 2 + (Math.random() - 0.5) * 200,
        vx: 0, vy: 0, fixed: false
    };
    n.r = getNodeRadius(n);

    var g = document.createElementNS(svgNS, 'g');
    g.setAttribute('class', 'node');
    g.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');

    var circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('r', n.r);
    circle.setAttribute('fill', getNodeColor(n));
    circle.setAttribute('stroke', isMyNode ? '#fff' : getNodeColor(n));
    circle.setAttribute('stroke-width', isMyNode ? 3 : 2);
    g.appendChild(circle);

    var text = document.createElementNS(svgNS, 'text');
    text.setAttribute('dy', n.r + 14);
    text.textContent = shortName;
    g.appendChild(text);

    n.gEl = g; n.circleEl = circle; n.textEl = text;

    // Tooltip
    g.addEventListener('mouseenter', function(e) {
        var roleNames = ['Client', 'Client Mute', 'Router', 'Router Client', 'Repeater',
                         'Tracker', 'Sensor', 'TAK', 'Client Hidden', 'Lost and Found', 'TAK Tracker'];
        var snrStr = n.avgSnr > -999 ? n.avgSnr.toFixed(1) + ' dB' : 'unknown';
        tooltip.innerHTML =
            '<b>' + n.name + '</b><br>' +
            'Short: ' + n.shortName + '<br>' +
            'Role: ' + (roleNames[n.role] || 'Unknown') + '<br>' +
            'Avg SNR: ' + snrStr + '<br>' +
            'Observations: ' + n.count + '<br>' +
            'ID: !' + n.id.toString(16).padStart(8, '0');
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top  = (e.clientY + 15) + 'px';
        circle.setAttribute('stroke', '#fff');
        circle.setAttribute('stroke-width', 3);
    });
    g.addEventListener('mousemove', function(e) {
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top  = (e.clientY + 15) + 'px';
    });
    g.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
        circle.setAttribute('stroke', n.isMyNode ? '#fff' : getNodeColor(n));
        circle.setAttribute('stroke-width', n.isMyNode ? 3 : 2);
    });

    // Drag to pin
    g.addEventListener('mousedown', function(e) {
        e.stopPropagation();
        dragTarget = n;
        n.fixed = true;
        dragOffset.x = n.x - (e.clientX - transform.x) / transform.k;
        dragOffset.y = n.y - (e.clientY - transform.y) / transform.k;
    });

    gNodes.appendChild(g);
    nodes[nodeNum] = n;
    simNodes.push(n);
}

document.addEventListener('mousemove', function(e) {
    if (dragTarget) {
        dragTarget.x = (e.clientX - transform.x) / transform.k + dragOffset.x;
        dragTarget.y = (e.clientY - transform.y) / transform.k + dragOffset.y;
        render();
    }
});
document.addEventListener('mouseup', function() {
    if (dragTarget) {
        dragTarget.fixed = false;
        dragTarget = null;
        restartSimulation();
    }
});

// addLink(fromNode, toNode, snr, bidirectional, count)
function addLink(fromNode, toNode, snr, bidirectional, count) {
    var key = Math.min(fromNode, toNode) + '-' + Math.max(fromNode, toNode);
    var s = nodes[fromNode], t = nodes[toNode];
    if (!s || !t) return;

    var color = getLinkColor(snr);
    var w     = getLinkWidth(count);
    var dash  = bidirectional ? 'none' : '6,4';
    var label = snr > -999 ? snr.toFixed(1) + ' dB' : '';

    if (links[key]) {
        var l = links[key];
        l.snr = snr; l.bidirectional = bidirectional; l.count = count;
        l.source = s; l.target = t;
        if (l.el) {
            l.el.setAttribute('stroke', color);
            l.el.setAttribute('stroke-width', w);
            l.el.setAttribute('stroke-dasharray', dash);
        }
        if (l.labelEl) l.labelEl.textContent = label;
        return;
    }

    var line = document.createElementNS(svgNS, 'line');
    line.setAttribute('class', 'link');
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', w);
    line.setAttribute('stroke-dasharray', dash);
    line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
    line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
    gLinks.appendChild(line);

    var lbl = document.createElementNS(svgNS, 'text');
    lbl.setAttribute('class', 'link-label');
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('x', (s.x + t.x) / 2);
    lbl.setAttribute('y', (s.y + t.y) / 2 - 5);
    lbl.textContent = label;
    gLinks.appendChild(lbl);

    var l = { source: s, target: t, snr: snr, bidirectional: bidirectional, count: count, el: line, labelEl: lbl };
    links[key] = l;
    simLinks.push(l);
}

function clearGraph() {
    while (gNodes.firstChild) gNodes.removeChild(gNodes.firstChild);
    while (gLinks.firstChild) gLinks.removeChild(gLinks.firstChild);
    nodes = {}; links = {}; simNodes = []; simLinks = [];
}

function restartSimulation() {
    simAlpha = 1;
    if (!simRunning) { simRunning = true; requestAnimationFrame(tick); }
}

// ── Node search ───────────────────────────────────────────────────────────────
searchBox.addEventListener('input', function() {
    var q = searchBox.value.trim().toLowerCase();
    for (var id in nodes) {
        var n = nodes[id];
        var match = !q ||
            n.name.toLowerCase().indexOf(q) !== -1 ||
            n.shortName.toLowerCase().indexOf(q) !== -1 ||
            n.id.toString(16).indexOf(q) !== -1;
        if (n.gEl) n.gEl.setAttribute('opacity', match ? 1.0 : 0.2);
    }
});

// ── Path highlighting ─────────────────────────────────────────────────────────
function highlightPath(nodeIds) {
    for (var id in nodes) {
        var n = nodes[id];
        if (n.circleEl) {
            n.circleEl.setAttribute('stroke', n.isMyNode ? '#fff' : getNodeColor(n));
            n.circleEl.setAttribute('stroke-width', n.isMyNode ? 3 : 2);
        }
    }
    for (var key in links) {
        links[key].el.setAttribute('stroke-opacity', 0.3);
    }

    for (var i = 0; i < nodeIds.length; i++) {
        var n = nodes[nodeIds[i]];
        if (n && n.circleEl) {
            n.circleEl.setAttribute('stroke', '#ffeb3b');
            n.circleEl.setAttribute('stroke-width', 4);
        }
    }
    for (var i = 0; i < nodeIds.length - 1; i++) {
        var k = Math.min(nodeIds[i], nodeIds[i+1]) + '-' + Math.max(nodeIds[i], nodeIds[i+1]);
        if (links[k]) {
            links[k].el.setAttribute('stroke', '#ffeb3b');
            links[k].el.setAttribute('stroke-opacity', 1);
            links[k].el.setAttribute('stroke-width', 4);
        }
    }

    setTimeout(function() {
        for (var key in links) {
            var l = links[key];
            l.el.setAttribute('stroke', getLinkColor(l.snr));
            l.el.setAttribute('stroke-opacity', 0.7);
            l.el.setAttribute('stroke-width', getLinkWidth(l.count));
        }
        for (var id in nodes) {
            var n = nodes[id];
            if (n.circleEl) {
                n.circleEl.setAttribute('stroke', n.isMyNode ? '#fff' : getNodeColor(n));
                n.circleEl.setAttribute('stroke-width', n.isMyNode ? 3 : 2);
            }
        }
    }, 5000);
}

// ── QWebChannel handshake ─────────────────────────────────────────────────────
function initWebChannel() {
    if (typeof QWebChannel === 'undefined' || !window.qt || !window.qt.webChannelTransport) {
        setTimeout(initWebChannel, 100);
        return;
    }
    new QWebChannel(qt.webChannelTransport, function(channel) {
        var bridge = channel.objects.bridge;
        if (bridge) bridge.notifyReady();
    });
}
initWebChannel();
</script>
</body>
</html>
